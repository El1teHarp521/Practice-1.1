<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Офлайн Задачи (Напоминания)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0c; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 550px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-weight: 900; letter-spacing: 2px; margin: 0; text-transform: uppercase; font-size: 24px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .badge.online { background: rgba(74, 222, 128, 0.2); border: 1px solid #4ade80; color: #4ade80; }
        .badge.offline { background: rgba(255, 69, 58, 0.2); border: 1px solid #ff453a; color: #ff453a; }
        .form-card { background: #141418; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .form-card h3 { margin-top: 0; font-size: 14px; color: #8e8e93; text-transform: uppercase; margin-bottom: 15px; }
        .form-group { display: flex; gap: 10px; flex-wrap: wrap; }
        input { flex-grow: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid #222; background: #000; color: #fff; outline: none; font-family: inherit; }
        input[type="datetime-local"] { flex-grow: 0; width: 180px; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        button:hover { transform: scale(1.03); }
        .btn-success { background: #4ade80; color: #000; }
        .btn-error { background: #ff453a; color: #fff; }
        ul { list-style: none; padding: 0; margin-top: 30px; }
        li { background: #141418; padding: 20px; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.5s ease-out; display: flex; justify-content: space-between; align-items: flex-start; }
        .task-content { flex-grow: 1; }
        .reminder-info { color: #4ade80; font-size: 12px; font-weight: bold; margin-top: 8px; display: block; }
        .btn-delete { background: rgba(255, 69, 58, 0.1); color: #ff453a; border: 1px solid rgba(255, 69, 58, 0.3); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-left: 15px; }
        .btn-delete:hover { background: #ff453a; color: #fff; transform: scale(1.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { margin-top: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ЗАДАЧИ</h1>
            <div id="network-status" class="badge online">🌐 В сети</div>
        </div>
        <div class="form-card"><h3>Обычная задача</h3><form id="task-form" class="form-group"><input type="text" id="task-input" placeholder="Что нужно сделать?" required><button type="submit">ДОБАВИТЬ</button></form></div>
        <div class="form-card"><h3>Запланировать напоминание</h3><form id="reminder-form" class="form-group"><input type="text" id="reminder-text" placeholder="Текст напоминания" required><input type="datetime-local" id="reminder-time" required><button type="submit" class="btn-success">НАПОМНИТЬ</button></form></div>
        <ul id="task-list"></ul>
        <footer><button id="enable-push" class="btn-success">🔔 Включить уведомления</button><button id="disable-push" class="btn-error" style="display:none;">🔕 Отключить уведомления</button></footer>
    </div>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
